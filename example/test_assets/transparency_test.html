<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: transparent;
  }

  .box {
    position: absolute;
    width: 180px;
    padding: 16px;
    background: #333;
    color: #fff;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    border-radius: 8px;
    cursor: pointer;
  }

  .box:hover { background: #555; }

  .top-left { top: 30px; left: 30px; }
  .top-right { top: 30px; right: 30px; }
  .bottom-center { bottom: 30px; left: 50%; transform: translateX(-50%); }
</style>
</head>
<body>
  <div class="box top-left" onclick="this.textContent='Clicked!'">Box A</div>
  <div class="box top-right" onclick="this.textContent='Clicked!'">Box B</div>
  <div class="box bottom-center" onclick="this.textContent='Clicked!'">Box C</div>
</body>
</html>
